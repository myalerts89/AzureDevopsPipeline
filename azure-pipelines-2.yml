trigger:
- main

strategy:
  matrix:
    linux: 
        OpratingSystem : ubuntu-latest
    mac: 
      OpratingSystem : macos-latest



pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world $(OpratingSystem)!
  displayName: 'Run a one-line script'

