trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: DevEnv
    jobs:
      - job: FirstJob
        steps:
          - bash: echo ths is DevStage
          - bash: echo $(Build.ArtifactStagingDirectory)
          - bash: echo $(Agent.BuildDirectory)
          - bash: echo $(Agent.Id)
          - bash: echo $(Agent.Name)
          - bash: echo $(Agent.OS)
  - stage: TestEnv
    dependsOn: DevEnv
    jobs:
      - job: SecondJob
        steps:
          - bash: echo "This is Test Env"
  - stage: NonProdEnv
    dependsOn: DevEnv
    jobs:
      - job: thirdJob
        steps:
          - bash: echo "This is NonProd Env"
  - stage: ProdEnv
    jobs:
      - job: FourthJob
        steps:
          - bash: echo "this is Prod Env"